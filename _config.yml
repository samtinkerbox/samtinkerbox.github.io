# The Site Configuration

theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Tokyo

title: SamTinkerBox
tagline: AI tools, PM tactics, and automation playbooks from a CPO who codes
description: >-
  Hands-on AI tool reviews and product automation playbooks from an acting CPO.
  Tested in real production workflows — no hype, only what ships.

url: "https://samtinkerbox.github.io"

github:
  username: samtinkerbox

twitter:
  username: samtinkerbox

social:
  name: SamTinkerBox
  email: samtinkerbox@gmail.com
  fediverse_handle:
  links:
    - https://twitter.com/samtinkerbox
    - https://github.com/samtinkerbox
    - https://medium.com/@samtinkerbox

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id: G-3NF3FZSF4V
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode:

cdn:

avatar: /assets/img/avatar.jpg

social_preview_image: /assets/img/avatar.jpg

toc: true

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:
      - "/games-support"

paginate: 10

baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

include:
  - app-ads.txt

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
